name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: pivotal-purpose-480304-k6
  SERVICE_NAME: test
  REGION: us-central1
  REPOSITORY: us-docker.pkg.dev/cloudrun/container
  IMAGE_NAME: hello

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      # - name: Configure Docker for Artifact Registry
      #   run: gcloud auth configure-docker us-docker.pkg.dev

      # - name: Build Docker image
      #   run: |
      #     docker build -t ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
      #     docker tag ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
      #                ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      # - name: Push Docker image
      #   run: |
      #     docker push ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      #     docker push ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest


      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --min-instances=0 \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \

      - name: Route traffic to latest revision
        run: |
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --to-latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Get Service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "🚀 Service deployed at: $SERVICE_URL"